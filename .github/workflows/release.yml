name: Build Release

permissions:
  contents: write

env:
  REPOSITORY_FOLDER: "src"
  PLUGIN_NAME: "LuckyDefuse"

# Triggered by pushing a tag (created manually, e.g. in SourceTree).
# The workflow never creates tags itself.
on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Get repository name
      run: echo "REPOSITORY_NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV

    - name: Check Version.cs matches the tag
      run: |
        version=$(grep -oP '(?<=ModuleVersion => ")[^"]*' ${{ env.REPOSITORY_FOLDER }}/Version.cs)
        if [ "$version" != "${{ github.ref_name }}" ]; then
          echo "::error::Version.cs ($version) does not match the tag (${{ github.ref_name }}). Bump Version.cs before tagging."
          exit 1
        fi

    - name: Setup .NET
      uses: actions/setup-dotnet@v4.3.1
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build plugin
      run: dotnet publish -c Release

    - name: Prepare plugin info file
      run: |
        INFO_PATH="${{ env.REPOSITORY_FOLDER }}/bin/Release/net10.0/publish/${{ env.PLUGIN_NAME }}.info"
        echo "version: ${{ github.ref_name }}" > "$INFO_PATH"
        echo "repository: https://github.com/${{ github.repository }}" >> "$INFO_PATH"

    - name: Package release
      run: |
        cd ${{ env.REPOSITORY_FOLDER }}/bin/Release/net10.0
        mv publish ${{ env.PLUGIN_NAME }}
        zip -r $GITHUB_WORKSPACE/${{ env.REPOSITORY_NAME }}-${{ github.ref_name }}.zip ${{ env.PLUGIN_NAME }}

    - name: Generate release notes
      run: |
        git fetch --tags --force origin
        prev=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
        if [ -n "$prev" ]; then
          notes=$(git log --pretty=format:"- %s (%an)" "$prev..${{ github.ref_name }}")
        else
          notes=$(git log --pretty=format:"- %s (%an)" "${{ github.ref_name }}")
        fi
        echo "release_notes<<EOF" >> $GITHUB_ENV
        echo "$notes" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2.3.2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body: ${{ env.release_notes }}
        files: |
          ${{ env.REPOSITORY_NAME }}-${{ github.ref_name }}.zip
